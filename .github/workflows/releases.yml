name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: PrintIt-linux-x64.zip
          - os: windows-latest
            asset_name: PrintIt-windows-x64.zip
          - os: macos-latest
            asset_name: PrintIt-macos-arm64.zip
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Build self-contained fat jar
        run: mvn -B clean package -DskipTests

      - name: Package app image with jpackage
        shell: bash
        run: |
          mkdir -p target/jpackage-input
          cp target/PrintIt-1.0-SNAPSHOT.jar target/jpackage-input/
          jpackage --type app-image \
            --input target/jpackage-input \
            --main-jar PrintIt-1.0-SNAPSHOT.jar \
            --main-class com.implycitt.printit.Launcher \
            --name PrintIt \
            --dest target/dist

      - name: Zip app image (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/dist
          zip -r "../../${{ matrix.asset_name }}" .

      - name: Zip app image (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/dist/* -DestinationPath "${{ matrix.asset_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
